<!DOCTYPE html>
<html>
<head>
  <title>Create Icons</title>
</head>
<body>
  <canvas id="icon192" width="192" height="192"></canvas>
  <canvas id="icon512" width="512" height="512"></canvas>
  <script>
    function createIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      
      // Background - Spotify green
      ctx.fillStyle = '#1db954';
      ctx.fillRect(0, 0, size, size);
      
      // Circle
      ctx.fillStyle = '#0f172a';
      const padding = size * 0.1;
      ctx.beginPath();
      ctx.arc(size/2, size/2, (size/2) - padding, 0, 2 * Math.PI);
      ctx.fill();
      
      // Music note emoji would need font rendering, so we'll use a simple shape
      ctx.fillStyle = '#1db954';
      ctx.font = `${size * 0.4}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('♪', size/2, size/2);
    }
    
    createIcon('icon192', 192);
    createIcon('icon512', 512);
    
    // Convert to download
    document.getElementById('icon192').toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'icon-192.png';
      a.click();
    });
    
    document.getElementById('icon512').toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.download = 'icon-512.png';
      a.href = url;
      setTimeout(() => a.click(), 100);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Generate SpotifiMessage Icons</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #0f172a;
      color: #fff;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    canvas {
      border: 2px solid #1db954;
      margin: 10px;
      display: block;
    }
    button {
      background: #1db954;
      color: #0f172a;
      border: none;
      padding: 15px 30px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px 5px;
    }
    button:hover {
      background: #1ed760;
    }
    .instructions {
      background: #1e293b;
      padding: 15px;
      border-radius: 5px;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎵 SpotifiMessage Icon Generator</h1>
    <div class="instructions">
      <p><strong>Instructions:</strong></p>
      <ol>
        <li>Click the buttons below to download each icon</li>
        <li>Save the files to: <code>web-react/public/</code></li>
        <li>Replace the existing icon files if prompted</li>
        <li>Refresh your browser to see the new icons</li>
      </ol>
    </div>
    
    <h3>192x192 Icon</h3>
    <canvas id="icon192" width="192" height="192"></canvas>
    <button onclick="downloadIcon('icon192', 'icon-192.png')">Download icon-192.png</button>
    
    <h3>512x512 Icon</h3>
    <canvas id="icon512" width="512" height="512"></canvas>
    <button onclick="downloadIcon('icon512', 'icon-512.png')">Download icon-512.png</button>
    
    <button onclick="downloadBoth()" style="background: #fff; color: #0f172a; margin-top: 20px;">Download Both Icons</button>
  </div>
  
  <script>
    function createIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      
      // Background - Spotify green
      ctx.fillStyle = '#1db954';
      ctx.fillRect(0, 0, size, size);
      
      // Dark circle
      ctx.fillStyle = '#0f172a';
      const padding = size * 0.1;
      ctx.beginPath();
      ctx.arc(size/2, size/2, (size/2) - padding, 0, 2 * Math.PI);
      ctx.fill();
      
      // Music note symbol
      ctx.fillStyle = '#1db954';
      ctx.font = `bold ${size * 0.4}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('♪', size/2, size/2);
    }
    
    function downloadIcon(canvasId, filename) {
      const canvas = document.getElementById(canvasId);
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      });
    }
    
    function downloadBoth() {
      downloadIcon('icon192', 'icon-192.png');
      setTimeout(() => downloadIcon('icon512', 'icon-512.png'), 300);
    }
    
    // Generate icons on page load
    createIcon('icon192', 192);
    createIcon('icon512', 512);
  </script>
</body>
</html>

# Railway/Nixpacks: backend runs from web-react (Flask server.py)
# Nix Python is externally managed; use a venv so we don't modify the system.

[phases.install]
cmds = [
  "cd web-react && python3 -m venv .venv",
  "cd web-react && .venv/bin/pip install --no-cache-dir -r requirements.txt"
]

[phases.build]
# Dependencies already installed in install phase; skip default pip (not on PATH)
cmds = ["true"]

[start]
cmd = "cd web-react && .venv/bin/python server.py"

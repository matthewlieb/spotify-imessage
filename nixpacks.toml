# Railway/Nixpacks: Full-stack deployment (React frontend + Flask backend)
# Builds React first, then sets up Python backend

[phases.install]
cmds = [
  # Step 1: Build React frontend
  "cd web-react && npm ci",
  "cd web-react && npm run build",
  # Step 2: Verify React build exists
  "test -d web-react/build || (echo 'ERROR: React build failed!' && exit 1)",
  "test -f web-react/build/index.html || (echo 'ERROR: index.html not found!' && exit 1)",
  # Step 3: Set up Python environment
  "cd web-react && python3 -m venv .venv",
  "cd web-react && .venv/bin/pip install --no-cache-dir -r requirements.txt"
]

[phases.build]
# Build phase - React already built in install phase
cmds = [
  "echo '✅ React frontend built successfully'",
  "echo '✅ Python dependencies installed'",
  "echo '✅ Ready to serve full-stack application'"
]

[start]
cmd = "cd web-react && .venv/bin/python server.py"

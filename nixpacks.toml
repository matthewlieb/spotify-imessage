# Railway/Nixpacks: backend runs from web-react (Flask server.py)
# Use python3 -m pip (pip not on PATH). Override build so only install runs.

[phases.install]
# Nix python3 has no pip; bootstrap it then install deps
cmds = ["cd web-react && python3 -m ensurepip --user --upgrade && python3 -m pip install --user --no-cache-dir -r requirements.txt"]

[phases.build]
cmds = []

[start]
cmd = "cd web-react && python3 server.py"

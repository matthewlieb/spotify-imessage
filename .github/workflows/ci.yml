name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-react/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install web-react npm dependencies
        run: cd web-react && npm ci

      - name: Install web-react Python dependencies
        run: |
          cd web-react
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build React app
        run: cd web-react && npm run build
